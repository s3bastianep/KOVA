services:
  postgres:
    image: postgres:16-alpine
    container_name: kova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kova
      POSTGRES_PASSWORD: kova_dev_password
      POSTGRES_DB: kova_talent_os
    ports:
      - "5432:5432"
    volumes:
      - kova_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kova -d kova_talent_os"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kova_pg_data:
